name: Android Build & Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Prepare Signing Keystore
        id: prepare-keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Signing secrets found. Decoding release keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
            echo "keystore_path=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
            echo "store_password=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "key_alias=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "key_password=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            echo "Warning: No KEYSTORE_BASE64 secret found. Generating a temporary self-signed keystore for building..."
            keytool -genkeypair -v \
              -keystore release.keystore \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass "tempstorepass" \
              -keypass "tempstorepass" \
              -dname "CN=ZenithUsagi, OU=Development, O=Personal, L=City, S=State, C=US"
            echo "keystore_path=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
            echo "store_password=tempstorepass" >> $GITHUB_ENV
            echo "key_alias=upload" >> $GITHUB_ENV
            echo "key_password=tempstorepass" >> $GITHUB_ENV
          fi

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ env.keystore_path }}
          STORE_PASSWORD: ${{ env.store_password }}
          KEY_ALIAS: ${{ env.key_alias }}
          KEY_PASSWORD: ${{ env.key_password }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug-apk
          path: dist/debug

      - name: Download Release APK
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: dist/release

      - name: Rename APKs for release
        run: |
          mkdir -p dist/final
          cp dist/debug/*.apk "dist/final/ZenithUsagi-${{ github.ref_name }}-debug.apk"
          cp dist/release/*.apk "dist/final/ZenithUsagi-${{ github.ref_name }}-release.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/final/*
          name: "Zenith Usagi ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: false
