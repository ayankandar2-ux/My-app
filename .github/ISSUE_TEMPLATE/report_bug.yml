name: 🐞 Bug report
description: Report a bug in Usagi
labels: [bug]
body:

    - type: textarea
      id: summary
      attributes:
          label: Brief summary
          description: Please describe, what went wrong
      validations:
          required: true

    - type: textarea
      id: reproduce-steps
      attributes:
          label: Steps to reproduce
          description: Please provide a way to reproduce this issue. Screenshots or videos can be very helpful
          placeholder: |
              Example:
                1. First step
                2. Second step
                3. Issue here
      validations:
          required: false

    - type: input
      id: usagi-version
      attributes:
          label: Usagi version
          description: You can find your Usagi version in **Settings → About**.
          placeholder: |
              Example: "0.0.1"
      validations:
          required: true

    - type: input
      id: android-version
      attributes:
          label: Android version
          description: You can find this somewhere in your Android settings.
          placeholder: |
              Example: "16.0"
      validations:
          required: true

    - type: input
      id: device
      attributes:
          label: Device
          description: List your device and model.
          placeholder: |
              Example: "Samsung S26 Ultra"
      validations:
          required: false

    - type: checkboxes
      id: acknowledgements
      attributes:
          label: Acknowledgements
          options:
              - label: This is not a duplicate of an existing issue. Please look through the list of [open issues](https://github.com/UsagiApp/Usagi/issues) before creating a new one.
                required: true
              - label: This is not an issue with a specific plugin / source / extension. Otherwise, you must close this issue immediately because we **do not** accept support for issues related to it.
                required: true